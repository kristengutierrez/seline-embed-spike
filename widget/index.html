<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LIVE WIDGET</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#111;color:#0f0;font-family:ui-monospace,Menlo,monospace;
    display:flex;align-items:center;justify-content:center;height:100%;text-align:center}
  #wrap{padding:16px}
  #clock{font-size:28px;font-weight:bold}
  #countdown{font-size:20px;margin-top:8px}
  #nonce{font-size:11px;opacity:.6;margin-top:12px;word-break:break-all}
  #built{font-size:11px;opacity:.6}
</style>
</head>
<body>
<div id="wrap">
  <div id="clock">--:--:--</div>
  <div id="countdown">computing…</div>
  <div id="built">page loaded: <span id="loadedAt"></span></div>
  <div id="nonce">load nonce: <span id="nonceVal"></span></div>
</div>
<script>
  document.getElementById('loadedAt').textContent = new Date().toISOString();
  document.getElementById('nonceVal').textContent = Math.random().toString(36).slice(2) + '-' + Date.now();

  var target = new Date('2026-12-25T00:00:00Z').getTime();

  function tick() {
    var now = new Date();
    document.getElementById('clock').textContent = now.toUTCString().split(' ')[4] + ' UTC';
    var diff = target - now.getTime();
    if (diff < 0) diff = 0;
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    document.getElementById('countdown').textContent =
      'T-minus ' + d + 'd ' + h + 'h ' + m + 'm ' + s + 's';
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
